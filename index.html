<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
    <title>Unity WebGL Player | Fingertip fracture</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            background: #fff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #unity-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        #unity-canvas {
            aspect-ratio: 16 / 9;
            width: min(100vw, 177.7778vh);
            height: min(56.25vw, 100vh);
            background: #1F1F20;
            display: block;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>
    </div>

    <script src="Build/Fingertip Fracture.loader.js"></script>
    <script>
        const canvas = document.querySelector("#unity-canvas");

        createUnityInstance(canvas, {
            dataUrl: "Build/Fingertip Fracture.data",
            frameworkUrl: "Build/Fingertip Fracture.framework.js",
            codeUrl: "Build/Fingertip Fracture.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Fingertip fracture",
            productVersion: "1.0",

            // 保持 Unity 渲染尺寸跟随 Canvas 显示尺寸
            matchWebGLToCanvasSize: true,

            // 如果想降低高分屏压力，可以打开这一行
            // devicePixelRatio: 1,
        });
    </script>
</body>
</html>
